name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=v$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        if: steps.check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists, skipping release"

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.exists == 'false'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.check.outputs.exists == 'false'

      - run: pnpm build
        if: steps.check.outputs.exists == 'false'

      - name: Zip extension
        if: steps.check.outputs.exists == 'false'
        run: cd .output/chrome-mv3 && zip -r ../../mira-chrome.zip .

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: mira-chrome.zip
          generate_release_notes: true
